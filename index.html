<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quy trình thủy lợi 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F3F4F6; min-height: 100vh; padding: 24px 16px 40px; }

  .page-title { text-align: center; color: #B91C1C; font-size: 15px; font-weight: 700; margin-bottom: 6px; line-height: 1.5; max-width: 720px; margin-left: auto; margin-right: auto; }
  .page-sub { text-align: center; color: #6B7280; font-size: 13px; margin-bottom: 20px; }

  /* GROUP TABS */
  .group-tabs { display: flex; gap: 8px; justify-content: center; margin-bottom: 14px; }
  .gtab { padding: 7px 18px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1.5px solid #E5E7EB; background: #fff; color: #6B7280; transition: all 0.2s; }
  .gtab.active { background: #B91C1C; color: #fff; border-color: #B91C1C; }

  /* WORKFLOW MENU */
  .menu-wrap { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 18px; }
  .menu-btn { padding: 6px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px solid #E5E7EB; background: #fff; color: #6B7280; transition: all 0.2s; white-space: nowrap; }
  .menu-btn.active { background: #FEE2E2; color: #B91C1C; border-color: #FECACA; font-weight: 600; }
  .menu-btn:hover { border-color: #FECACA; color: #B91C1C; }

  /* CARD */
  .wrap { background: #fff; border-radius: 16px; padding: 22px 24px 24px; max-width: 720px; margin: 0 auto; border: 1px solid #F3F4F6; }
  .hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; }
  .hdr-icon { width: 38px; height: 38px; background: #FEE2E2; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .hdr-icon svg { width: 18px; height: 18px; }
  .hdr-title { color: #B91C1C; font-weight: 600; font-size: 15px; line-height: 1.4; }

  /* TIMELINE */
  .timeline-wrap { position: relative; padding: 0 16px; }
  .track-bg { position: absolute; top: 36px; left: calc(16px + 18px); right: calc(16px + 18px); height: 2px; background: #E5E7EB; border-radius: 2px; }
  .track-fill { position: absolute; top: 36px; left: calc(16px + 18px); right: calc(16px + 18px); height: 2px; background: transparent; border-radius: 2px; overflow: hidden; }
  .track-fill-inner { height: 100%; background: #DC2626; border-radius: 2px; width: 0%; transition: width 0.7s cubic-bezier(0.4,0,0.2,1); }
  .steps-row { display: flex; justify-content: space-between; align-items: flex-start; position: relative; z-index: 1; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; cursor: pointer; user-select: none; }
  .step-num { font-size: 12px; color: #9CA3AF; font-weight: 500; height: 18px; line-height: 18px; transition: color 0.3s; }
  .step-dot-wrap { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; }
  .step-dot { width: 14px; height: 14px; border-radius: 50%; background: #D1D5DB; transition: all 0.4s ease; }
  .step.active .step-dot { background: #DC2626; width: 22px; height: 22px; box-shadow: 0 0 0 6px #FECACA; }
  .step.done .step-dot { background: #DC2626; width: 16px; height: 16px; box-shadow: none; }
  .step-lbl { font-size: 11px; color: #9CA3AF; text-align: center; line-height: 1.4; max-width: 90px; transition: color 0.3s; }
  .step.active .step-lbl, .step.done .step-lbl { color: #DC2626; }
  .step.active .step-num, .step.done .step-num { color: #DC2626; font-weight: 600; }

  /* DETAIL */
  .detail { margin-top: 18px; background: #FFF7F7; border-radius: 12px; border: 1px solid #FEE2E2; padding: 16px 18px; min-height: 120px; }
  .d-title { font-size: 13px; font-weight: 600; color: #DC2626; margin-bottom: 8px; }
  .d-units { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
  .d-unit { font-size: 11px; background: #FEE2E2; color: #B91C1C; border-radius: 6px; padding: 2px 8px; font-weight: 500; }
  .d-text { font-size: 12.5px; color: #4B5563; line-height: 1.7; }

  /* PROGRESS */
  .progress-bar-wrap { margin-top: 12px; height: 3px; background: #E5E7EB; border-radius: 2px; overflow: hidden; }
  .progress-bar-inner { height: 100%; background: #DC2626; width: 0%; border-radius: 2px; }
  .prog-txt { font-size: 12px; color: #9CA3AF; text-align: center; margin-top: 10px; }

  /* DEADLINE TABLE */
  .deadline-wrap { max-width: 720px; margin: 24px auto 0; background: #fff; border-radius: 16px; padding: 22px 24px; border: 1px solid #F3F4F6; }
  .deadline-title { font-size: 15px; font-weight: 600; color: #B91C1C; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .deadline-title svg { width: 18px; height: 18px; }
  .dl-section { font-size: 12px; font-weight: 600; color: #6B7280; text-transform: uppercase; letter-spacing: 0.05em; margin: 14px 0 8px; }
  .dl-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px; border-radius: 8px; margin-bottom: 4px; font-size: 13px; }
  .dl-row:nth-child(odd) { background: #F9FAFB; }
  .dl-label { color: #374151; }
  .dl-date { color: #DC2626; font-weight: 600; white-space: nowrap; margin-left: 12px; }
</style>
</head>
<body>

<div class="page-title">Trình tự, thủ tục lập hồ sơ hợp đồng, nghiệm thu, thanh lý các hợp đồng cung cấp và sử dụng sản phẩm, dịch vụ thủy lợi năm 2026</div>
<div class="page-sub">Bấm vào từng bước để xem chi tiết</div>

];

const icons = {
  contract: `<svg viewBox="0 0 20 20" fill="none" stroke="#B91C1C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="2" width="14" height="16" rx="2"/><line x1="6" y1="7" x2="14" y2="7"/><line x1="6" y1="10" x2="14" y2="10"/><line x1="6" y1="13" x2="10" y2="13"/></svg>`,
  check: `<svg viewBox="0 0 20 20" fill="none" stroke="#B91C1C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 10l4 4 8-8"/><rect x="2" y="2" width="16" height="16" rx="3"/></svg>`,
  sign: `<svg viewBox="0 0 20 20" fill="none" stroke="#B91C1C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 8h10M5 12h6"/><rect x="3" y="2" width="14" height="16" rx="2"/><path d="M13 15l2 2 3-3" stroke-width="1.5"/></svg>`
};

const STEP_DUR = 10000;
let curGroup = 0, curFlow = 0, cur = 0;
let playing = true, stepTimer = null, pbTimer = null, pbStart = null;

function pct(i, total) { return total <= 1 ? 0 : (i / (total - 1)) * 100; }

function getSteps() { return groups[curGroup][curFlow].steps; }

function renderMenu() {
  const wrap = document.getElementById('menu-wrap');
  wrap.innerHTML = groups[curGroup].map((f, i) =>
    `<div class="menu-btn ${i===curFlow?'active':''}" onclick="switchFlow(${i})">${f.label}</div>`
  ).join('');
}

function renderHeader() {
  const f = groups[curGroup][curFlow];
  document.getElementById('hdr-icon').innerHTML = icons[f.icon];
  document.getElementById('hdr-title').textContent = f.title;
}

function renderSteps() {
  const steps = getSteps();
  document.getElementById('steps-row').innerHTML = steps.map((s, i) =>
    `<div class="step ${i===cur?'active':i<cur?'done':''}" onclick="goTo(${i})">
      <div class="step-num">${s.num}</div>
      <div class="step-dot-wrap"><div class="step-dot"></div></div>
      <div class="step-lbl">${s.lbl.replace(/\n/g,'<br>')}</div>
    </div>`
  ).join('');
}

function renderDetail() {
  const steps = getSteps();
  const s = steps[cur];
  document.getElementById('detail').innerHTML =
    `<div class="d-title">${s.title}</div>
     <div class="d-units">${s.units.map(u=>`<span class="d-unit">${u}</span>`).join('')}</div>
     <div class="d-text">${s.text}</div>`;
  document.getElementById('prog-txt').textContent = `${cur+1} / ${steps.length}`;
  document.getElementById('track-fill').style.width = pct(cur, steps.length) + '%';
}

function startProgressBar() {
  clearInterval(pbTimer);
  const bar = document.getElementById('progress-bar-inner');
  bar.style.transition = 'none';
  bar.style.width = '0%';
  pbStart = Date.now();
  pbTimer = setInterval(() => {
    const p = Math.min(((Date.now()-pbStart)/STEP_DUR)*100, 100);
    bar.style.width = p + '%';
    if (p >= 100) clearInterval(pbTimer);
  }, 30);
}

function scheduleNext() {
  clearTimeout(stepTimer);
  if (!playing) return;
  stepTimer = setTimeout(() => {
    const steps = getSteps();
    cur = cur < steps.length-1 ? cur+1 : 0;
    renderSteps(); renderDetail(); startProgressBar(); scheduleNext();
  }, STEP_DUR);
}

function goTo(i) {
  cur = i; renderSteps(); renderDetail();
  if (playing) { startProgressBar(); scheduleNext(); }
}

function switchFlow(i) {
  curFlow = i; cur = 0;
  clearTimeout(stepTimer); clearInterval(pbTimer);
  renderMenu(); renderHeader(); renderSteps(); renderDetail();
  startProgressBar(); scheduleNext();
}

function switchGroup(g) {
  curGroup = g; curFlow = 0; cur = 0;
  clearTimeout(stepTimer); clearInterval(pbTimer);
  document.querySelectorAll('.gtab').forEach((el,i) => el.classList.toggle('active', i===g));
  renderMenu(); renderHeader(); renderSteps(); renderDetail();
  renderDeadlines();
  startProgressBar(); scheduleNext();
}

const deadlines = [
  [
    { label: "Hợp đồng vụ Đông Xuân", date: "31/3/2026" },
    { label: "Hợp đồng cây trồng theo năm", date: "31/3/2026" },
    { label: "Nghiệm thu & thanh lý vụ Đông Xuân", date: "15/5/2026" },
    { label: "Hợp đồng vụ Hè Thu", date: "10/6/2026" },
    { label: "Nghiệm thu & thanh lý vụ Hè Thu", date: "30/9/2026" },
    { label: "Hợp đồng vụ Mùa", date: "10/10/2026" },
    { label: "Nghiệm thu & thanh lý vụ Mùa", date: "15/12/2026" },
    { label: "Nghiệm thu & thanh lý cả năm", date: "15/12/2026" }
  ],
  [
    { label: "Hồ sơ hợp đồng", date: "15/3/2026" },
    { label: "Hồ sơ nghiệm thu hợp đồng", date: "Cuối tháng / cuối quý" },
    { label: "Hồ sơ thanh lý hợp đồng", date: "15/12/2026" }
  ]
];

const dlHeadings = [
  "Thời hạn nộp hồ sơ — Nhóm I (được hỗ trợ)",
  "Thời hạn nộp hồ sơ — Nhóm II (không hỗ trợ)"
];

function renderDeadlines() {
  document.getElementById('dl-heading').textContent = dlHeadings[curGroup];
  document.getElementById('dl-body').innerHTML = deadlines[curGroup]
    .map((d, i) => `<div class="dl-row" style="${i%2===0?'background:#F9FAFB':''}"><span class="dl-label">${d.label}</span><span class="dl-date">${d.date}</span></div>`)
    .join('');
}

switchGroup(0);
renderDeadlines();
</script>
</body>
</html>
